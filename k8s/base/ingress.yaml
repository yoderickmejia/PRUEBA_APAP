apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prueba-tecnica-apap
  labels:
    app.kubernetes.io/name: prueba-tecnica-apap
    app.kubernetes.io/component: backend
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - "dev.20-245-96-137.sslip.io"
      secretName: prueba-tecnica-apap-tls
  rules:
    - host: "dev.20-245-96-137.sslip.io"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prueba-tecnica-apap
                port:
                  name: http