apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: qa

bases:
  - ../../base

commonLabels:
  app.kubernetes.io/environment: qa

images:
  - name: ymonterom/prueba-tecnica-apap
    newTag: latest

patches:
  - path: patch-replicas.yaml
    target:
      kind: Deployment
      name: prueba-tecnica-apap
  - path: patch-ingress.yaml
    target:
      kind: Ingress
      name: prueba-tecnica-apap
  - path: patch-certificate.yaml
    target:
      kind: Certificate
      name: prueba-tecnica-apap-tls