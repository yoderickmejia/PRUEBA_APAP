apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prueba-apap-prod
  namespace: argocd
  labels:
    app.kubernetes.io/name: prueba-tecnica-apap
    app.kubernetes.io/environment: prod
  finalizers:
    - resources-finalizer.argocd.io
spec:
  project: default
  source:
    repoURL: https://github.com/yoderickmejia/PRUEBA_APAP.git
    targetRevision: main
    path: k8s/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
  revisionHistoryLimit: 10
