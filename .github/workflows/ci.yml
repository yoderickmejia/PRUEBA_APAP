name: CI Pipeline

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - main
      - master

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/prueba-tecnica-apap

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Instalar dependencias, lint y tests
  # ─────────────────────────────────────────────
  test:
    name: 🧪 Install, Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependencias
        run: npm ci --frozen-lockfile

      # BONUS: Linting antes de los tests
      - name: Lint (ESLint)
        run: npm run lint --if-present

      - name: Ejecutar pruebas unitarias con cobertura
        run: npm test -- --coverage --coverageReporters=lcov --coverageReporters=text

      # Publicar resultados de cobertura como artefacto
      - name: Publicar reporte de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 2: Análisis SAST con SonarCloud
  # ─────────────────────────────────────────────
  sonar:
    name: 🔍 SAST — SonarCloud
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout código (con historial completo para Sonar)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependencias
        run: npm ci --frozen-lockfile

      # Regenerar cobertura para que Sonar la lea
      - name: Generar reporte de cobertura (lcov)
        run: npm test -- --coverage --coverageReporters=lcov

      - name: Análisis SonarCloud
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        # La configuración del proyecto se lee desde sonar-project.properties

  # ─────────────────────────────────────────────
  # JOB 3: Build Docker + Trivy + Push
  # ─────────────────────────────────────────────
  build-and-push:
    name: 🐳 Docker Build, Scan & Push
    runs-on: ubuntu-latest
    needs: sonar

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      # Genera tags: latest + SHA corto + fecha
      - name: Generar metadata de la imagen
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' }}
            type=sha,prefix=sha-,format=short
            type=raw,value={{date 'YYYYMMDD'}}-{{sha}}

      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Buildx para cache eficiente
      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build de la imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false          # Primero solo build, luego Trivy escanea
          load: true           # Carga en el daemon local para el escaneo
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Escaneo de seguridad con Trivy ──
      - name: Escaneo de vulnerabilidades con Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:latest
          format: "table"
          exit-code: "1"                        # Falla el pipeline si hay críticos
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL"
          output: trivy-report.txt

      - name: Publicar reporte de Trivy como artefacto
        uses: actions/upload-artifact@v4
        if: always()                             # Publicar aunque Trivy haya fallado
        with:
          name: trivy-security-report
          path: trivy-report.txt
          retention-days: 7

      # Solo llega aquí si Trivy no encontró CRITICALs
      - name: Push de la imagen al registry
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # JOB 4: CD — Actualizar tag en repositorio GitOps
  # ─────────────────────────────────────────────
  update-gitops:
    name: 🚀 CD — Actualizar GitOps
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repositorio GitOps
        uses: actions/checkout@v4
        with:
          # Si GitOps está en el mismo repo, omite 'repository' y 'token'
          # Si es un repo separado, usa un PAT con permisos de escritura
          repository: ${{ secrets.GITOPS_REPO }}   # ej: tu-usuario/prueba-tecnica-gitops
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops

      - name: Instalar kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Actualizar image tag en overlay dev
        env:
          NEW_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          cd gitops/k8s/overlays/dev
          kustomize edit set image prueba-tecnica-apap=${{ env.IMAGE_NAME }}:${NEW_TAG}

      - name: Commit y push del nuevo tag
        env:
          NEW_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          cd gitops
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/dev/kustomization.yaml
          git commit -m "chore: update image tag to ${NEW_TAG} [skip ci]"
          git push origin main